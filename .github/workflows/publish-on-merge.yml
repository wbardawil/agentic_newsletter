name: Publish on Merge

# Step 1.5: when a draft PR (branch drafts/<edition-id>) merges to main, treat
# the merge as the editor's approval and run the publish pipeline.
#
# The merge IS the integrity attestation — the editor reviewed the diff and
# approved. So this workflow runs publish:edition with --skip-hash-check, since
# the editor may have committed copy fixes to the branch (which would otherwise
# trip the content-hash guard built for tamper detection).
#
# Required repository secrets:
#   ANTHROPIC_API_KEY        — Amplifier (LLM-driven social copy)
#   BEEHIIV_API_KEY          — required, creates the Beehiiv post
#   BEEHIIV_PUBLICATION_ID   — required
#   LINKEDIN_ACCESS_TOKEN    — optional, LinkedIn distribution
#   TWITTER_API_KEY          — optional
#   TWITTER_API_SECRET       — optional
#   TWITTER_ACCESS_TOKEN     — optional
#   TWITTER_ACCESS_SECRET    — optional
#   AIRTABLE_API_KEY         — optional, run ledger
#   AIRTABLE_BASE_ID         — optional
#
# Failure recovery: if publish fails after merge, the workflow status is the
# signal. Re-trigger by running this workflow manually via the Actions tab,
# passing the edition ID as input.

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      edition:
        description: "Edition ID (YYYY-WW) to (re-)publish"
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: publish-${{ github.event.pull_request.head.ref || inputs.edition }}
  cancel-in-progress: false

jobs:
  publish:
    # Only run on merged PRs whose source branch is drafts/*, OR on manual dispatch.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       startsWith(github.event.pull_request.head.ref, 'drafts/'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve edition ID
        id: edition
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ID="${{ github.event.inputs.edition }}"
          else
            BRANCH="${{ github.event.pull_request.head.ref }}"
            ID="${BRANCH#drafts/}"
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Resolved edition: $ID"

      - name: Verify draft files exist
        run: |
          ID="${{ steps.edition.outputs.id }}"
          if [ ! -f "drafts/${ID}-draft.json" ]; then
            echo "::error::drafts/${ID}-draft.json not found on main. Did the PR commit it?"
            exit 1
          fi
          echo "Found drafts/${ID}-draft.json"

      - name: Publish edition
        id: publish
        run: pnpm publish:edition -- --edition ${{ steps.edition.outputs.id }} --skip-hash-check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          LOG_LEVEL: info
          DRY_RUN: "false"

      - name: Commit publish artifacts back to main
        if: success()
        run: |
          ID="${{ steps.edition.outputs.id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "drafts/${ID}-social.json" "drafts/${ID}-metrics.json" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No publish artifacts to commit."
          else
            git commit -m "publish(${ID}): record distribution + social artifacts"
            git push origin main
          fi

      - name: Comment publish status on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = "${{ steps.publish.outcome }}";
            const id = "${{ steps.edition.outputs.id }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = status === "success"
              ? `✅ **Published edition ${id}** — Beehiiv post created, social variants emitted.\n\n[Run logs](${runUrl})`
              : `❌ **Publish failed for edition ${id}.** The PR was merged but distribution did not complete. Investigate and re-run via the Actions tab.\n\n[Run logs](${runUrl})`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
