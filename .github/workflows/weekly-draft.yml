name: Weekly Draft

# Cron-driven weekly run that produces a draft edition without anyone's
# laptop being on. Opens a pull request with the EN/ES drafts so the editor
# can review on a phone via the GitHub mobile app, request changes via PR
# comments, and merge to mark the draft approved.
#
# Pause / resume: set the repository variable WEEKLY_DRAFT_PAUSED to "true"
# (Settings → Secrets and variables → Actions → Variables) to skip the cron
# without disabling the workflow. Vacation mode in two taps from phone.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY        — required, drives Strategist/Writer/Validator/Localizer/QualityGate/Amplifier
#   FEEDLY_API_KEY           — optional, supplemental Radar source
#   AIRTABLE_API_KEY         — optional, run ledger
#   AIRTABLE_BASE_ID         — optional, run ledger
#   BEEHIIV_API_KEY          — not used by `pnpm draft` (only by publish:edition); set when ready
#   BEEHIIV_PUBLICATION_ID   — same
#   RESEND_API_KEY           — optional, sends digest email after PR is opened
#   RESEND_FROM              — optional, verified sender address ("Drafts <drafts@yourdomain.com>")
#   RESEND_TO                — optional, your editor inbox
#   APPROVAL_BASE_URL        — optional, Cloudflare Worker URL (phase 2 of the email gate)
#   APPROVAL_SIGNING_SECRET  — optional, HMAC secret shared with the Worker
#
# When the three RESEND_* values are set, the workflow sends a digest email
# after the draft PR is opened. When any of them is missing, the digest step
# logs "skipping" and the workflow still succeeds.
#
# When APPROVAL_BASE_URL + APPROVAL_SIGNING_SECRET are also set, the digest
# email contains a one-click "Approve and publish" magic link instead of a
# manual workflow_dispatch deep-link. See workers/approval-receiver/README.md
# for the one-time Cloudflare Worker deployment.
#
# Schedule: Mondays 13:00 UTC = 8am ET / 7am CT. Adjust the cron line below
# if you want a different day or hour.

on:
  schedule:
    - cron: "0 13 * * MON"
  workflow_dispatch:
    inputs:
      edition:
        description: "Edition ID (YYYY-WW); leave blank to auto-compute from current ISO week"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: weekly-draft
  cancel-in-progress: false

jobs:
  pause-check:
    runs-on: ubuntu-latest
    outputs:
      paused: ${{ steps.check.outputs.paused }}
    steps:
      - id: check
        run: |
          if [ "${{ vars.WEEKLY_DRAFT_PAUSED }}" = "true" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "paused=true" >> "$GITHUB_OUTPUT"
            echo "::notice::WEEKLY_DRAFT_PAUSED=true — skipping this week's cron. Manual dispatch still works."
          else
            echo "paused=false" >> "$GITHUB_OUTPUT"
          fi

  draft:
    needs: pause-check
    if: needs.pause-check.outputs.paused != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compute edition ID
        id: edition
        run: |
          if [ -n "${{ github.event.inputs.edition }}" ]; then
            echo "id=${{ github.event.inputs.edition }}" >> "$GITHUB_OUTPUT"
          else
            echo "id=$(date -u +%G-%V)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run draft pipeline
        run: pnpm draft -- --edition ${{ steps.edition.outputs.id }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FEEDLY_API_KEY: ${{ secrets.FEEDLY_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          NEWSLETTER_AUTHOR: ${{ secrets.NEWSLETTER_AUTHOR }}
          LOG_LEVEL: info
          DRY_RUN: "false"

      - name: Open / update draft PR
        id: open_pr
        uses: peter-evans/create-pull-request@v7
        with:
          branch: drafts/${{ steps.edition.outputs.id }}
          base: main
          title: "Draft — Edition ${{ steps.edition.outputs.id }}"
          add-paths: |
            drafts/**
            config/localization-memory.json
          commit-message: "draft(${{ steps.edition.outputs.id }}): weekly auto-generated draft"
          body: |
            Auto-generated weekly draft for edition **${{ steps.edition.outputs.id }}**.

            Review on phone via the GitHub mobile app.
            Request edits via PR comment, or commit fixes directly to this branch.
            Merging this PR marks the draft approved (publish flow is a follow-up).

            Run: ${{ github.run_id }} • [logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: |
            draft
            weekly
          delete-branch: false

      - name: Send draft digest email
        if: success() && env.RESEND_API_KEY != '' && env.RESEND_FROM != '' && env.RESEND_TO != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
          APPROVAL_BASE_URL: ${{ secrets.APPROVAL_BASE_URL }}
          APPROVAL_SIGNING_SECRET: ${{ secrets.APPROVAL_SIGNING_SECRET }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PR_URL="${{ steps.open_pr.outputs.pull-request-url }}"
          ID="${{ steps.edition.outputs.id }}"
          if [ -n "$PR_URL" ]; then
            pnpm digest:edition -- --edition "$ID" --pr-url "$PR_URL"
          else
            pnpm digest:edition -- --edition "$ID"
          fi

      - name: Note skipped digest when Resend not configured
        if: success() && (env.RESEND_API_KEY == '' || env.RESEND_FROM == '' || env.RESEND_TO == '')
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RESEND_TO: ${{ secrets.RESEND_TO }}
        run: echo "::notice::Resend not fully configured (RESEND_API_KEY / RESEND_FROM / RESEND_TO) — digest email skipped. PR is the only review channel for this run."

      - name: Upload drafts as artifact (fallback if no diff was committed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drafts-${{ steps.edition.outputs.id }}
          path: drafts/
          retention-days: 30
          if-no-files-found: warn

  notify-on-failure:
    needs: [pause-check, draft]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Open / update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "🚨 Weekly draft cron failed";
            const body = [
              `The Monday cron failed at ${new Date().toUTCString()}.`,
              ``,
              `[Run logs](${runUrl})`,
              ``,
              `Common causes:`,
              `- ANTHROPIC_API_KEY missing or revoked`,
              `- Anthropic API rate limit / outage`,
              `- A breaking change in the prompt or schema (check recent commits to main)`,
              ``,
              `Re-trigger via Actions → Weekly Draft → Run workflow once the cause is fixed.`,
            ].join("\n");

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "draft-failure",
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["draft-failure", "ops"],
              });
            }
